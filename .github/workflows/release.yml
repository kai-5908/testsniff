name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Validate release tag matches project version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          uv run python - <<'PY'
          from pathlib import Path
          import tomllib
          import os

          tag = os.environ["RELEASE_TAG"]
          expected = tag.removeprefix("v")

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          project_version = pyproject["project"]["version"]

          init_text = Path("src/testsniff/__init__.py").read_text(encoding="utf-8")
          version_line = next(
              line for line in init_text.splitlines() if line.startswith("__version__ = ")
          )
          package_version = version_line.split("=", 1)[1].strip().strip('"')

          if project_version != expected or package_version != expected:
              raise SystemExit(
                  "Release tag, pyproject version, and package __version__ must match: "
                  f"{tag=}, {project_version=}, {package_version=}"
              )
          PY

      - name: Verify changelog entry exists
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          version="${RELEASE_TAG#v}"
          grep -q "^## \[$version\]" CHANGELOG.md

      - name: Run quality checks
        run: |
          uv run ruff check src tests
          uv run ty check src
          uv run pytest -q --cov=testsniff --cov-report=term-missing --cov-fail-under=100

      - name: Build package
        run: uv build

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
